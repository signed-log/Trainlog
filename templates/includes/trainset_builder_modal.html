<!-- Trainset Builder Modal — include in forms that have a #material_type input -->
<style>
  .tsb-unit { min-width:68px; max-width:84px; font-size:.7rem; background:#f8f9fa;
              border:1px solid #dee2e6; border-radius:4px; padding:4px; text-align:center; }
  .tsb-unit img { max-height:38px; max-width:76px; display:block; margin:0 auto 2px; }
  .tsb-unit .tsb-nom { display:block; overflow:hidden; text-overflow:ellipsis;
                       white-space:nowrap; width:100%; }
  .tsb-unit[draggable="true"] { cursor: grab; }
  .tsb-unit.tsb-drag-over-left  { border-left: 3px solid #0d6efd; }
  .tsb-unit.tsb-drag-over-right { border-right: 3px solid #0d6efd; }
</style>

<div class="modal fade" id="tsbModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header py-2">
        <h6 class="modal-title mb-0"><i class="fas fa-train me-2"></i>{{tsbBuildTrainset}}</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body pb-2">
        <div class="text-muted" style="font-size:.7rem; font-weight:600; text-transform:uppercase;
             letter-spacing:.05em; margin-bottom:4px">{{tsbBuildSection}}</div>
        <input type="text" id="tsb-q" class="form-control form-control-sm mb-1"
               placeholder="{{tsSearchWagons}}" autocomplete="off">
        <div id="tsb-results" class="list-group mb-2" style="max-height:160px;overflow-y:auto"></div>
        <hr class="my-2">
        <div id="tsb-ref-badge" style="display:none; font-size:.75rem; color:#0d6efd;
             margin-bottom:4px; align-items:center; gap:4px">
          <i class="fas fa-link"></i>
          <span id="tsb-ref-name"></span>
          <button type="button" onclick="tsbBreakRef()" style="border:0; background:none;
                  cursor:pointer; color:#999; font-size:.9rem; line-height:1; padding:0"
                  title="Edit / break reference">✎</button>
        </div>
        <div id="tsb-strip" class="d-flex flex-wrap gap-2 py-1" style="min-height:60px">
          <span id="tsb-empty" class="text-muted fst-italic small m-auto">{{tsEmptyHint}}</span>
        </div>
      </div>
      <div class="modal-footer flex-wrap gap-2 py-2">
        <!-- Save name row, hidden until "Save & apply" is clicked -->
        <div id="tsb-save-row" class="input-group input-group-sm me-auto d-none" style="max-width:260px">
          <input type="text" id="tsb-save-name" class="form-control" placeholder="{{tsTrainsetNamePlaceholder}}">
          <button type="button" class="btn btn-success btn-sm mb-0" onclick="tsbConfirmSave()">{{tsSaveBtn}}</button>
        </div>
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">{{cancel}}</button>
        <button type="button" class="btn btn-outline-primary btn-sm" id="tsb-use-btn"
                onclick="tsbUseOnce()" disabled>{{tsbUseOnce}}</button>
        <button type="button" class="btn btn-primary btn-sm" id="tsb-save-btn"
                onclick="tsbToggleSave()" disabled>{{tsbSaveAndUse}}</button>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  var _units        = [];
  var _uid          = 0;
  var _timer        = null;
  var WAGONS        = '{{ url_for("static", filename="images/wagons") }}';
  var _i18n         = {
    noResults:  '{{tsbNoResults}}',
    flip:       '{{tsFlipSide}}',
    remove:     '{{remove}}',
    saveFailed: '{{tsSaveFailed}}',
    public:     '{{tsPubBadge}}'
  };
  var _adminSets    = [];
  var _personalSets = [];
  var _refName      = null; // set when strip is loaded as a reference (not for editing)
  var _dragUid      = null;

  /* ── open ── */
  window.openTsbModal = function () {
    _units = [];
    _refName = null;
    var sourceId = window._tsbAdvTarget || 'material_type_advanced';
    var sourceEl = document.getElementById(sourceId);
    var val = sourceEl ? sourceEl.value : '';
    try {
      var saved = JSON.parse(val);
      if (Array.isArray(saved)) {
        saved.forEach(function(u) { _units.push(Object.assign({}, u, { _uid: ++_uid, _side: u._side || 'L' })); });
      }
    } catch(e) {
      // val is a trainset name — load in reference mode
      if (val) {
        _refName = val;
        fetch('/api/trainsets/resolve?value=' + encodeURIComponent(val))
          .then(function(r) { return r.json(); })
          .then(function(units) {
            units.forEach(function(u) { _units.push(Object.assign({}, u, { _uid: ++_uid, _side: u._side || 'L' })); });
            _render();
          });
      }
    }
    document.getElementById('tsb-q').value = '';
    document.getElementById('tsb-results').innerHTML = '';
    document.getElementById('tsb-save-row').classList.add('d-none');
    document.getElementById('tsb-save-name').value = '';
    _render();
    _fetchSets();
    $('#tsbModal').modal('show');
  };

  /* ── fetch saved sets (for search) ── */
  function _fetchSets() {
    $.getJSON('/api/trainsets', function(sets) {
      _personalSets = sets.filter(function(ts) { return !ts.is_admin; });
      _adminSets    = sets.filter(function(ts) { return ts.is_admin; });
    });
  }

  function _loadSavedIntoStrip(name) {
    fetch('/api/trainsets/resolve?value=' + encodeURIComponent(name))
      .then(function(r) { return r.json(); })
      .then(function(units) {
        _refName = name;
        _units = [];
        units.forEach(function(u) { _units.push(Object.assign({}, u, { _uid: ++_uid, _side: u._side || 'L' })); });
        _render();
        document.getElementById('tsb-q').value = '';
        document.getElementById('tsb-results').innerHTML = '';
      });
  }

  window.tsbBreakRef = function() {
    _refName = null;
    _render();
  };

  /* ── search ── */
  $(document).on('input', '#tsb-q', function () {
    clearTimeout(_timer);
    var q = this.value.trim();
    if (!q) { document.getElementById('tsb-results').innerHTML = ''; return; }
    _timer = setTimeout(function () { _search(q); }, 250);
  });

  function _search(q) {
    $.getJSON('/api/wagons/search', { q: q, limit: 12 }, function (rows) {
      var el = document.getElementById('tsb-results');
      el.innerHTML = '';

      // Prepend matching trainsets
      var ql = q.toLowerCase();
      var matchingSets = _personalSets.concat(_adminSets).filter(function(ts) {
        return ts.name.toLowerCase().indexOf(ql) !== -1;
      });
      matchingSets.forEach(function(ts) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'list-group-item list-group-item-action py-1 px-2 d-flex align-items-center gap-2';
        btn.style.background = ts.is_admin ? '#f0f4ff' : '#f5fff5';
        var icon = document.createElement('i');
        icon.className = 'fas fa-train';
        icon.style.cssText = 'font-size:.75rem;color:#6c757d;flex-shrink:0';
        btn.appendChild(icon);
        var label = document.createElement('span');
        label.style.fontSize = '.8rem';
        label.className = 'flex-fill text-truncate';
        label.textContent = ts.name;
        btn.appendChild(label);
        if (ts.is_admin) {
          var badge = document.createElement('span');
          badge.className = 'badge bg-primary ms-auto';
          badge.style.fontSize = '.6rem';
          badge.textContent = _i18n.public;
          btn.appendChild(badge);
        }
        btn.onclick = (function(tsName) { return function() { _loadSavedIntoStrip(tsName); }; })(ts.name);
        el.appendChild(btn);
      });

      if (!rows.length && !matchingSets.length) {
        el.innerHTML = '<div class="list-group-item small text-muted py-1">' + _i18n.noResults + '</div>';
        return;
      }
      rows.forEach(function (w) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'list-group-item list-group-item-action py-1 px-2 d-flex align-items-center gap-2';

        /* thumbnail */
        if (w.image) {
          var thumb = document.createElement('img');
          thumb.src = _imgSrc(w.image, 'L', w.image_type);
          thumb.style.cssText = 'height:28px;width:auto;flex-shrink:0;object-fit:contain';
          thumb.onerror = function () { this.remove(); };
          btn.appendChild(thumb);
        }

        /* text block */
        var info = document.createElement('div');
        info.className = 'flex-fill overflow-hidden';

        var top = document.createElement('div');
        top.className = 'd-flex align-items-baseline gap-1';

        var nomEl = document.createElement('strong');
        nomEl.className = 'text-truncate';
        nomEl.style.fontSize = '.8rem';
        nomEl.textContent = w.label || '?';
        top.appendChild(nomEl);

        if (w.era) {
          var epo = document.createElement('span');
          epo.className = 'badge bg-secondary ms-1';
          epo.style.fontSize = '.6rem';
          epo.textContent = w.era;
          top.appendChild(epo);
        }
        info.appendChild(top);

        var desc = [w.category, w.subcategory].filter(Boolean).join(' · ');
        if (desc) {
          var sub = document.createElement('div');
          sub.className = 'text-muted text-truncate';
          sub.style.fontSize = '.72rem';
          sub.textContent = desc;
          info.appendChild(sub);
        }
        btn.appendChild(info);

        btn.onclick = function () {
          _addUnit(w);
        };
        el.appendChild(btn);
      });
    });
  }

  /* ── unit management ── */
  function _addUnit(wagon) {
    _refName = null; // adding a wagon breaks the reference
    var defaultSide = wagon.image_type === 'sides_R' ? 'R' : 'L';
    _units.push(Object.assign({}, wagon, { _uid: ++_uid, _side: defaultSide }));
    _render();
  }

  window.tsbFlip = function (uid) {
    var u = _units.find(function (u) { return u._uid === uid; });
    if (u) { _refName = null; u._side = u._side === 'L' ? 'R' : 'L'; _render(); }
  };

  window.tsbRemove = function (uid) {
    _refName = null;
    _units = _units.filter(function (u) { return u._uid !== uid; });
    _render();
  };

  /* ── render strip ── */
  function _imgSrc(image, side, imageType) {
    if (!image) return '';
    if (imageType === 'sides') return WAGONS + '/' + image + (side === 'R' ? '_R' : '_L') + '.gif';
    if (imageType === 'sides_L') return WAGONS + '/' + image + '_L.gif';
    if (imageType === 'sides_R') return WAGONS + '/' + image + '_R.gif';
    return WAGONS + '/' + image + '.gif';
  }

  function _render() {
    var strip = document.getElementById('tsb-strip');
    strip.querySelectorAll('.tsb-unit').forEach(function (el) { el.remove(); });
    document.getElementById('tsb-empty').style.display = _units.length ? 'none' : '';

    // Reference badge
    var badge = document.getElementById('tsb-ref-badge');
    if (_refName) {
      document.getElementById('tsb-ref-name').textContent = _refName;
      badge.style.display = 'flex';
    } else {
      badge.style.display = 'none';
    }

    _units.forEach(function (u) {
      var card = document.createElement('div');
      card.className = 'tsb-unit';

      var img = document.createElement('img');
      img.src = _imgSrc(u.image, u._side, u.image_type);
      img.title = u.label || '';
      img.onerror = function () { this.style.display = 'none'; };
      card.appendChild(img);

      var nom = document.createElement('span');
      nom.className = 'tsb-nom';
      nom.textContent = u.label || '?';
      card.appendChild(nom);

      if (!_refName) {
        card.draggable = true;
        card.addEventListener('dragstart', (function(uid, c) { return function(e) {
          _dragUid = uid;
          e.dataTransfer.effectAllowed = 'move';
          setTimeout(function() { c.style.opacity = '0.4'; }, 0);
        }; })(u._uid, card));
        card.addEventListener('dragend', function() {
          card.style.opacity = '';
          strip.querySelectorAll('.tsb-unit').forEach(function(el) {
            el.classList.remove('tsb-drag-over-left', 'tsb-drag-over-right');
          });
        });
        card.addEventListener('dragover', (function(c) { return function(e) {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          strip.querySelectorAll('.tsb-unit').forEach(function(el) {
            el.classList.remove('tsb-drag-over-left', 'tsb-drag-over-right');
          });
          var rect = c.getBoundingClientRect();
          c.classList.add(e.clientX < rect.left + rect.width / 2 ? 'tsb-drag-over-left' : 'tsb-drag-over-right');
        }; })(card));
        card.addEventListener('drop', (function(uid, c) { return function(e) {
          e.preventDefault();
          if (_dragUid === uid) return;
          var fromIdx = _units.findIndex(function(x) { return x._uid === _dragUid; });
          var toIdx   = _units.findIndex(function(x) { return x._uid === uid; });
          if (fromIdx === -1 || toIdx === -1) return;
          var rect = c.getBoundingClientRect();
          var insertAfter = e.clientX >= rect.left + rect.width / 2;
          var moved = _units.splice(fromIdx, 1)[0];
          toIdx = _units.findIndex(function(x) { return x._uid === uid; });
          _units.splice(insertAfter ? toIdx + 1 : toIdx, 0, moved);
          _render();
        }; })(u._uid, card));

        var btns = document.createElement('div');
        btns.className = 'd-flex justify-content-center gap-1 mt-1';

        if (u.image_type === 'sides') {
          var flip = document.createElement('button');
          flip.type = 'button';
          flip.className = 'btn btn-outline-secondary p-0';
          flip.style.cssText = 'font-size:.6rem;width:18px;height:18px;line-height:1';
          flip.title = _i18n.flip;
          flip.textContent = '↔';
          flip.onclick = (function (uid) { return function () { tsbFlip(uid); }; })(u._uid);
          btns.appendChild(flip);
        }

        var rm = document.createElement('button');
        rm.type = 'button';
        rm.className = 'btn btn-outline-danger p-0';
        rm.style.cssText = 'font-size:.6rem;width:18px;height:18px;line-height:1';
        rm.title = _i18n.remove;
        rm.textContent = '×';
        rm.onclick = (function (uid) { return function () { tsbRemove(uid); }; })(u._uid);

        btns.appendChild(rm);
        card.appendChild(btns);
      }

      strip.appendChild(card);
    });

    var any = _units.length > 0;
    document.getElementById('tsb-use-btn').disabled  = !any;
    document.getElementById('tsb-save-btn').disabled = !any;
  }

  /* ── actions ── */
  function _tsbWriteAndClose(value) {
    var targetId = window._tsbAdvTarget || 'material_type_advanced';
    document.getElementById(targetId).value = value;
    if (typeof window._tsbAdvCallback === 'function') {
      window._tsbAdvCallback(value);
    }
    window._tsbAdvTarget = null;
    window._tsbAdvCallback = null;
    $('#tsbModal').modal('hide');
  }

  window.tsbUseOnce = function () {
    if (_refName) {
      _tsbWriteAndClose(_refName);
      return;
    }
    var json = JSON.stringify(_units.map(function (u) {
      return { name: u.name, image: u.image, label: u.label, _side: u._side, image_type: u.image_type };
    }));
    _tsbWriteAndClose(json);
  };

  window.tsbToggleSave = function () {
    var row = document.getElementById('tsb-save-row');
    row.classList.toggle('d-none');
    if (!row.classList.contains('d-none'))
      document.getElementById('tsb-save-name').focus();
  };

  window.tsbConfirmSave = function () {
    var name = document.getElementById('tsb-save-name').value.trim();
    if (!name) { document.getElementById('tsb-save-name').focus(); return; }
    var units = _units.map(function (u) { return { name: u.name, _side: u._side || 'L' }; });
    $.ajax({
      url: '/api/trainsets', method: 'POST',
      contentType: 'application/json',
      data: JSON.stringify({ name: name, units: units }),
      success: function (data) { _tsbWriteAndClose(data.name); },
      error: function (xhr) {
        var msg = _i18n.saveFailed;
        try { msg = JSON.parse(xhr.responseText).error || msg; } catch (e) {}
        alert(msg);
      }
    });
  };
}());
</script>
