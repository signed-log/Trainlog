{% extends "bootstrap/layout.html" %}
{% block content %}
{% include nav %}

<style>
  .wagon-img {
    height: 38px; max-width: 90px; object-fit: contain;
    cursor: zoom-in;
  }
</style>

<div class="container-fluid px-4">
  <h1 class="mt-3">Wagons</h1>
  <div class="mb-3 d-flex gap-2">
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addModal">
      <i class="fas fa-plus me-1"></i>Add Wagon
    </button>
    <button class="btn btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#vwModal" disabled hidden>
      <i class="fas fa-train me-1"></i>Import from VagonWeb
    </button>
    <a class="btn btn-outline-secondary"  href="{{ url_for('trainset.trainset_builder') }}"><i class="fa-solid fa-screwdriver-wrench"></i> {{tsBuilderTitle}}</a>
  </div>
  <table id="wagonsTable" class="table table-striped table-bordered" style="width:100%">
    <thead>
      <tr>
        <th data-priority="3">Name (key)</th>
        <th data-priority="1">Label</th>
        <th data-priority="4">Category</th>
        <th data-priority="5">Subcategory</th>
        <th data-priority="6">Era</th>
        <th data-priority="2">Type</th>
        <th data-priority="2" data-orderable="false">Image</th>
        <th data-priority="1" data-orderable="false">Actions</th>
      </tr>
    </thead>
  </table>
</div>


<!-- ══════════════════════════════════ VagonWeb Import Modal -->
<div class="modal fade" id="vwModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="fas fa-train me-2"></i>Import from VagonWeb</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <label class="form-label">VagonWeb composition URL</label>
        <input type="url" id="vwUrl" class="form-control"
               placeholder="https://www.vagonweb.cz/razeni/vlak.php?zeme=ZSSK&amp;cislo=186&amp;rok=2026">
        <div id="vwResult" class="small mt-2"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary" id="vwImport">Import</button>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════ Add Modal -->
<div class="modal fade" id="addModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="fas fa-train me-2"></i>Add Wagon</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="addForm" enctype="multipart/form-data">
          <div class="row g-2 mb-2">
            <div class="col-md-4">
              <label class="form-label fw-semibold">Label <span class="text-danger">*</span></label>
              <input type="text" class="form-control" name="label" required placeholder="e.g. TGV Duplex">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Category</label>
              <input type="text" class="form-control" name="category" placeholder="e.g. High-speed trains">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Subcategory</label>
              <input type="text" class="form-control" name="subcategory" placeholder="e.g. TGV Duplex">
            </div>
          </div>
          <div class="row g-2 mb-2">
            <div class="col-md-2">
              <label class="form-label fw-semibold">Era</label>
              <input type="text" class="form-control" name="era" placeholder="e.g. 5,6">
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold">Image type</label>
              <select class="form-select" name="image_type" id="addImageType">
                <option value="plain">Plain</option>
                <option value="sides" selected>Sides (L+R)</option>
                <option value="sides_L">Sides L only</option>
                <option value="sides_R">Sides R only</option>
              </select>
            </div>
            <div class="col-md-2">
              <label class="form-label fw-semibold">Gauge (mm)</label>
              <input type="number" class="form-control" name="gauge" placeholder="e.g. 1435">
            </div>
          </div>
          <div class="row g-2 mb-2">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Author</label>
              <input type="text" class="form-control" name="author" placeholder="e.g. J. Martin">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">License</label>
              <input type="text" class="form-control" name="license" placeholder="e.g. CC BY-NC-SA 3.0">
            </div>
          </div>

          <!-- Image upload (adapts to type) -->
          <div class="mb-3 p-3 border rounded bg-light">
            <label class="form-label fw-semibold small text-uppercase text-muted">Image upload</label>
            <div id="addUploadSection"></div>
          </div>

          <div>
            <label class="form-label fw-semibold">Notes</label>
            <textarea class="form-control" name="notes" rows="2" placeholder="e.g. SNCF livery, delivered 1997"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="submitAdd()">Save</button>
      </div>
    </div>
  </div>
</div>


<!-- ══════════════════════════════════ Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="fas fa-pencil me-2"></i>Edit — <span id="editModalTitle"></span></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="editForm">
          <div class="row g-2 mb-2">
            <div class="col-md-4">
              <label class="form-label fw-semibold">Label</label>
              <input type="text" class="form-control" name="label" placeholder="e.g. TGV Duplex">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Category</label>
              <input type="text" class="form-control" name="category" placeholder="e.g. High-speed trains">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Subcategory</label>
              <input type="text" class="form-control" name="subcategory" placeholder="e.g. TGV Duplex">
            </div>
          </div>
          <div class="row g-2 mb-2">
            <div class="col-md-2">
              <label class="form-label fw-semibold">Era</label>
              <input type="text" class="form-control" name="era" placeholder="e.g. 5,6">
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold">Image type</label>
              <select class="form-select" name="image_type">
                <option value="plain">Plain</option>
                <option value="sides">Sides (L+R)</option>
                <option value="sides_L">Sides L only</option>
                <option value="sides_R">Sides R only</option>
              </select>
            </div>
            <div class="col-md-2">
              <label class="form-label fw-semibold">Line type</label>
              <input type="text" class="form-control" name="line_type" placeholder="e.g. 1">
            </div>
            <div class="col-md-2">
              <label class="form-label fw-semibold">Gauge (mm)</label>
              <input type="number" class="form-control" name="gauge" placeholder="e.g. 1435">
            </div>
          </div>
          <div class="row g-2 mb-2">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Author</label>
              <input type="text" class="form-control" name="author" placeholder="e.g. J. Martin">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">License</label>
              <input type="text" class="form-control" name="license" placeholder="e.g. CC BY-NC-SA 3.0">
            </div>
          </div>
          <div class="row g-2 mb-2">
            <div class="col-md-12">
              <label class="form-label fw-semibold">Source</label>
              <input type="text" class="form-control" name="source" placeholder="e.g. MLG Traffic">
            </div>
          </div>
          <div>
            <label class="form-label fw-semibold">Notes</label>
            <textarea class="form-control" name="notes" rows="3" placeholder="e.g. SNCF livery, delivered 1997"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" onclick="submitEdit()">Save</button>
      </div>
    </div>
  </div>
</div>


<!-- ══════════════════════════════════ Image Modal (preview + replace) -->
<div class="modal fade" id="imgModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header py-2">
        <h6 class="modal-title mb-0" id="imgModalTitle">Image</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <!-- Full-size preview -->
        <div id="imgPreview" class="text-center mb-3"
             style="min-height:60px; background:#f8f9fa; border-radius:6px; padding:12px">
        </div>
        <hr class="my-3">
        <!-- Replace file(s) -->
        <div id="imgUploadSection"></div>
      </div>
    </div>
  </div>
</div>


<script defer>
const WAGONS_URL = '{{ url_for("static", filename="images/wagons") }}';
const API        = '/api/admin/wagons';

function imgSrc(image, itype) {
  if (!image) return '';
  if (itype === 'sides' || itype === 'sides_L') return `${WAGONS_URL}/${image}_L.gif`;
  if (itype === 'sides_R') return `${WAGONS_URL}/${image}_R.gif`;
  return `${WAGONS_URL}/${image}.gif`;
}
function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── DataTable ──────────────────────────────────────────────────── */
const table = $('#wagonsTable').DataTable({
  serverSide: true, processing: true, responsive: true,
  ajax: {
    url: API, type: 'GET',
    data: d => ({
      draw: d.draw, start: d.start, length: d.length,
      'search[value]': d.search.value,
      'order[0][column]': d.order[0].column,
      'order[0][dir]':    d.order[0].dir,
    })
  },
  columns: [
    { data: 'name',        orderable: true,  render: (d, t) => t === 'display' ? `<span class="font-monospace small">${esc(d)}</span>` : (d||'') },
    { data: 'label',       orderable: true,  render: (d) => esc(d) },
    { data: 'category',    orderable: true,  render: (d) => esc(d) },
    { data: 'subcategory', orderable: true,  render: (d) => esc(d) },
    { data: 'era',         orderable: true,  render: (d) => esc(d) },
    { data: 'image_type',  orderable: false, render: (d) => `<span class="badge bg-secondary text-white">${esc(d)}</span>` },
    {
      data: 'image', orderable: false,
      render(d, t, row) {
        if (t !== 'display') return d||'';
        const src = imgSrc(d, row.image_type);
        const inner = src
          ? `<img src="${src}" class="wagon-img" onerror="this.style.opacity='.2'" title="${esc(d)}">`
          : `<span class="text-muted small fst-italic">no image</span>`;
        return `<span class="img-cell" data-name="${esc(row.name)}" style="cursor:zoom-in">${inner}</span>`;
      }
    },
    {
      data: null, orderable: false,
      render(d, t, row) {
        if (t !== 'display') return '';
        return `<button class="btn btn-outline-primary btn-sm me-1 edit-btn" data-name="${esc(row.name)}" title="Edit"><i class="fas fa-pencil"></i></button>
                <button class="btn btn-danger btn-sm delete-btn" data-name="${esc(row.name)}" data-label="${esc(row.label)}" title="Delete"><i class="fa-regular fa-trash-can"></i></button>`;
      }
    }
  ],
  order: [[1, 'asc']], pageLength: 25, lengthMenu: [[25,50,100],[25,50,100]],
  language: { processing: '<i class="fas fa-spinner fa-spin"></i> Loading…' },
});

/* ── row cache ──────────────────────────────────────────────────── */
const _cache = {};
table.on('xhr', () => {
  const json = table.ajax.json();
  if (json && json.data) json.data.forEach(r => { _cache[r.name] = r; });
});

/* ── event delegation ───────────────────────────────────────────── */
$('#wagonsTable')
  .on('click', '.img-cell',   function () { openImgModal(this.dataset.name); })
  .on('click', '.edit-btn',   function () { openEditModal(this.dataset.name); })
  .on('click', '.delete-btn', function () { deleteWagon(this.dataset.name, this.dataset.label); });

/* ── add modal ──────────────────────────────────────────────────── */
function renderAddUpload(itype) {
  const sec = document.getElementById('addUploadSection');
  if (itype === 'sides') {
    sec.innerHTML = `
      <div class="row g-2">
        <div class="col-md-6">
          <label class="form-label small">L view <span class="text-muted">(optional)</span></label>
          <input type="file" name="file_l" class="form-control form-control-sm" accept=".gif,image/gif">
        </div>
        <div class="col-md-6">
          <label class="form-label small">R view <span class="text-muted">(optional)</span></label>
          <input type="file" name="file_r" class="form-control form-control-sm" accept=".gif,image/gif">
        </div>
      </div>`;
  } else {
    const label = itype === 'sides_L' ? 'L view' : itype === 'sides_R' ? 'R view' : 'Image';
    sec.innerHTML = `
      <label class="form-label small">${label} <span class="text-muted">(optional)</span></label>
      <input type="file" name="file" class="form-control form-control-sm" accept=".gif,image/gif">`;
  }
}

document.getElementById('addImageType').addEventListener('change', function () {
  renderAddUpload(this.value);
});
renderAddUpload('sides');

document.getElementById('addModal').addEventListener('show.bs.modal', function () {
  document.getElementById('addForm').reset();
  renderAddUpload('sides');
});

function submitAdd() {
  const f = document.getElementById('addForm');
  if (!f.checkValidity()) { f.reportValidity(); return; }
  fetch(API, { method: 'POST', body: new FormData(f) })
    .then(res => {
      if (!res.ok) return res.json().then(j => { throw new Error(j.error || res.status); });
      return res.json();
    })
    .then(j => {
      $('#addModal').modal('hide');
      table.ajax.reload();
      toast(`Wagon "${j.label}" added`);
    })
    .catch(err => toast(`Error: ${err}`, 'danger'));
}

document.getElementById('addForm').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') { e.preventDefault(); submitAdd(); }
});

/* ── edit modal ─────────────────────────────────────────────────── */
let _editWagon = null;
const _editFields = ['label','category','subcategory','era','image_type','line_type',
                     'gauge','author','license','source','notes'];

function openEditModal(wname) {
  const r = _cache[wname];
  if (!r) return;
  _editWagon = r;
  document.getElementById('editModalTitle').textContent = r.label || wname;
  const f = document.getElementById('editForm');
  _editFields.forEach(field => {
    const el = f.elements[field];
    if (!el) return;
    el.value = r[field] != null ? r[field] : '';
  });
  $('#editModal').modal('show');
}

function submitEdit() {
  if (!_editWagon) return;
  const f = document.getElementById('editForm');
  const data = {};
  _editFields.forEach(field => {
    const el = f.elements[field];
    if (el) data[field] = el.value;
  });
  fetch(`${API}/${encodeURIComponent(_editWagon.name)}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  }).then(res => {
    if (!res.ok) return res.json().then(j => { throw new Error(j.error || res.status); });
    $('#editModal').modal('hide');
    table.ajax.reload(null, false);
    toast('Wagon updated');
  }).catch(err => toast(`Error: ${err}`, 'danger'));
}

document.getElementById('editForm').addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') { e.preventDefault(); submitEdit(); }
});

/* ── image modal ────────────────────────────────────────────────── */
let _imgWagon = null;

function openImgModal(wname) {
  const r = _cache[wname];
  if (!r) return;
  _imgWagon = r;

  document.getElementById('imgModalTitle').textContent = `Image — ${r.label || wname}`;

  const preview = document.getElementById('imgPreview');
  const onErr   = `this.replaceWith(Object.assign(document.createElement('span'),{className:'text-muted small fst-italic',textContent:'(not found on disk)'}))`;
  if (r.image_type === 'sides' && r.image) {
    preview.innerHTML = `
      <div class="d-flex justify-content-center gap-4 flex-wrap">
        <div><div class="small text-muted mb-1">L view</div>
          <img src="${WAGONS_URL}/${r.image}_L.gif" style="max-height:200px;max-width:45vw" onerror="${onErr}"></div>
        <div><div class="small text-muted mb-1">R view</div>
          <img src="${WAGONS_URL}/${r.image}_R.gif" style="max-height:200px;max-width:45vw" onerror="${onErr}"></div>
      </div>`;
  } else {
    const src = imgSrc(r.image, r.image_type);
    preview.innerHTML = src
      ? `<img src="${src}" style="max-height:280px;max-width:80vw" onerror="${onErr}">`
      : `<span class="text-muted fst-italic">No image set</span>`;
  }

  const section = document.getElementById('imgUploadSection');
  if (r.image_type === 'sides') {
    section.innerHTML = `
      <p class="small fw-semibold mb-2">Replace image file(s)</p>
      <div class="row g-2">
        <div class="col-md-6">
          <label class="form-label small">L view</label>
          <div class="input-group input-group-sm">
            <input type="file" id="fileL" class="form-control" accept=".gif,image/gif">
            <button class="btn btn-outline-secondary" onclick="uploadFile('L')">Upload</button>
          </div>
        </div>
        <div class="col-md-6">
          <label class="form-label small">R view</label>
          <div class="input-group input-group-sm">
            <input type="file" id="fileR" class="form-control" accept=".gif,image/gif">
            <button class="btn btn-outline-secondary" onclick="uploadFile('R')">Upload</button>
          </div>
        </div>
      </div>`;
  } else {
    const lbl = r.image_type === 'sides_L' ? 'L view' : r.image_type === 'sides_R' ? 'R view' : 'Image';
    section.innerHTML = `
      <p class="small fw-semibold mb-2">Replace image file</p>
      <div class="input-group input-group-sm">
        <label class="input-group-text">${lbl}</label>
        <input type="file" id="filePlain" class="form-control" accept=".gif,image/gif">
        <button class="btn btn-outline-secondary" onclick="uploadFile('')">Upload</button>
      </div>`;
  }

  $('#imgModal').modal('show');
}

function uploadFile(side) {
  if (!_imgWagon) return;
  const inputId = side === 'L' ? 'fileL' : side === 'R' ? 'fileR' : 'filePlain';
  const file = document.getElementById(inputId).files[0];
  if (!file) { toast('Select a file first', 'warning'); return; }

  const fd = new FormData();
  fd.append('file', file);
  fd.append('side', side);

  fetch(`${API}/${encodeURIComponent(_imgWagon.name)}/image-file`, { method: 'POST', body: fd })
    .then(res => {
      if (!res.ok) return res.json().then(j => { throw new Error(j.error || res.status); });
      return res.json();
    })
    .then(j => {
      toast(`Saved: ${j.saved}`);
      document.getElementById(inputId).value = '';
      document.getElementById('imgPreview').querySelectorAll('img').forEach(img => {
        img.src = img.src.split('?')[0] + '?t=' + Date.now();
      });
      table.ajax.reload(null, false);
    })
    .catch(err => toast(`Error: ${err}`, 'danger'));
}

/* ── delete ─────────────────────────────────────────────────────── */
function deleteWagon(wname, label) {
  if (!confirm(`Delete wagon "${label}" (${wname})?`)) return;
  fetch(`${API}/${encodeURIComponent(wname)}`, { method: 'DELETE' })
    .then(res => {
      if (!res.ok) return res.text().then(t => { throw new Error(t); });
      table.ajax.reload();
      toast(`Wagon "${label}" deleted`);
    })
    .catch(err => toast(`Error: ${err}`, 'danger'));
}

/* ── toast ──────────────────────────────────────────────────────── */
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast align-items-center bg-${type} text-white border-0 position-fixed bottom-0 end-0 m-3`;
  el.setAttribute('role', 'alert'); el.setAttribute('aria-live', 'assertive'); el.setAttribute('aria-atomic', 'true');
  el.innerHTML = `<div class="d-flex"><div class="toast-body">${msg}</div>
    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>`;
  document.body.appendChild(el);
  const t = new bootstrap.Toast(el, { delay: 3000 });
  t.show();
  el.addEventListener('hidden.bs.toast', () => el.remove());
}

// ── VagonWeb import ────────────────────────────────────────────────────────
document.getElementById('vwImport').addEventListener('click', async () => {
  const url = document.getElementById('vwUrl').value.trim();
  if (!url) return;
  const btn = document.getElementById('vwImport');
  const out = document.getElementById('vwResult');
  btn.disabled = true;
  btn.textContent = 'Importing…';
  out.innerHTML = '';
  try {
    const resp = await fetch('/api/admin/vagonweb/import', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({url}),
    });
    const data = await resp.json();
    if (resp.ok) {
      const warn = data.errors && data.errors.length
        ? ` — ${data.errors.length} warning(s): ${data.errors.slice(0, 3).join('; ')}`
        : '';
      out.innerHTML = `<span class="text-success">`
        + `&#10003; ${data.wagons_imported} wagons imported, `
        + `${data.wagons_skipped} already existed, `
        + `${data.trainsets_created} compositions created${warn}</span>`;
      table.ajax.reload();
    } else {
      out.innerHTML = `<span class="text-danger">Error: ${data.error}</span>`;
    }
  } catch (e) {
    out.textContent = 'Network error';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Import';
  }
});
</script>

{% endblock %}
