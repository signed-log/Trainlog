{% extends "layout.html" %}
{% block content %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.5.1/gpx.min.js"></script>
<div id="map" class="mapRouting"></div>
<div id="sidebar">
    <div id="sidebar-content"></div>
</div>
{% if from_app %}
<style>
  div.leaflet-control-container { display: none !important; }
  nav.navbar { display: none !important; }
</style>
{% endif %}
<script>
// ─── Flutter bridge (for app) ───────────────────────────────────────────────
window.flutterBridge = {
  _send(event, payload) {
    if (!window.flutter_inappwebview) return;
    window.flutter_inappwebview.callHandler('routingEvent',  { event, ...payload });
  },
  loading(isLoading)          { this._send('loading',        { isLoading }); },
  routeInfo(text, distanceM, durationS) {
                                this._send('routeInfo',      { text, distanceM, durationS }); },
  routingError(message)       { this._send('routingError',   { message }); },
  saveTripDone(ok, trip)      { this._send('saveTripDone',   { ok, trip }); },
  saveError(message)          { this._send('saveError',      { message }); },
};
// ─── End Flutter bridge (for app) ───────────────────────────────────────────
var id = getGetParams().get("id");
var newTrip = null;
var currentRoute;
var routeDetails = null;
const texts = {
  "routeTitle": "{{routeTitle}}",
  "fineTuneNote": "{{fineTuneNote}}",
  "distanceTime": "{{distanceTime}}",
  "downloadGeoJSONButton": "{{downloadGeoJSONButton}}",
  "saveTripButton": "{{submit}}",
  "saveTripContinueButton": "{{saveTripContinueButton}}",
  "remove": "{{remove}}",
  "waypoint": "{{waypoint}}",
  "useNewRouter": "{{useNewRouter}}"
};

// Try POST data first, then sessionStorage
{% if trip_data %}
newTrip = {{ trip_data | safe }};
{% endif %}
if (!newTrip && id) {
    newTrip = JSON.parse(sessionStorage.getItem(id));
}

if (!newTrip) {
    document.getElementById('sidebar-content').innerHTML = '<h4>Error: No trip data provided</h4>';
    throw new Error('No trip data');
}

var fromApp = !!getGetParams().get("fromApp");
var type = getGetParams().get("type") || newTrip.type;
newTrip["type"] = type;
var freehand = getGetParams().get("freehand");
if (!freehand) {
    var routerurl = `${window.location.origin}/forwardRouting/${type}/route/v1`;
} else {
    location.href = "{{ url_for('freehand', username=username) }}" + location.search;
}
var origCoord = newTrip["originStation"][0];
var destCoord = newTrip["destinationStation"][0];
var origLabel = newTrip["originStation"][1];
var destLabel = newTrip["destinationStation"][1];
var wplist = [origCoord, destCoord];
var spinnerContent = '<div class="spinner-container"><div class="lds-spinner"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div></div>';
var errorContent = '<h4 id="routing-error">{{routingError}}<h4><p>{{routingErrorDetails}}</p><p><button onclick=\"location.reload()\">{{retry}}</button></p>';
var saveErrorContent = '<h4 id="save-error">{{saveError}}</h4><p>{{saveErrorDetails}}</p><p><button onclick=\"location.reload();\">{{retry}}</button></p>';
var map = createMap(null, origCoord);
var sidebar;
var getCountryUrl = '{{url_for("getCountry")}}';
routing(map, true, type, getCountryUrl);

async function saveTrip(continueTrip=false) {
    if (["accommodation", "restaurant", "poi"].includes(type)) {
        newTrip["trip_length"] = 0;
        newTrip["estimated_trip_duration"] = 0;
    }
    sidebar.setContent(spinnerContent);
    flutterBridge.loading(true);
    newTrip["details"] = routeDetails;
    $.post({
        url: '{{url_for("saveTrip", username=username)}}',
        data: {
            jsonPath: JSON.stringify(currentRoute),
            newTrip: JSON.stringify(newTrip),
            fromApp: fromApp
        },
        success: function(res) {
            if (fromApp) {
                flutterBridge.loading(false);
                flutterBridge.saveTripDone(true, res);
                return;
            }

            if (!continueTrip || newTrip.precision != "preciseDates") {
                location.href = "{{ url_for('landing') }}";
            } else {
                location.href = `{{ url_for('new', username=username, vehicle_type='') }}${type}?prevDest=${newTrip["destinationStation"]}&prevEndDate=${newTrip["newTripEndDate"]}&prevEndTime=${newTrip["newTripEndTime"]}`;
            }
        },
        error: function(xhr, status, error) {
            flutterBridge.loading(false);
            flutterBridge.saveError(error || 'Save failed');
            sidebar.setContent(saveErrorContent);
        }
    });
}
</script>
{% endblock %}
